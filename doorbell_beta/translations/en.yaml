configuration:
  doorbells:
    name: Doorbell Configuration
    description: Add one or more Hikvision doorbells.
    fields:
      name:
        name: Name
        description: The name that will be used for the MQTT device.
      ip:
        name: IP Address
        description: The IP address of your Hikvision device.
      port:
        name: Port
        description: The port to connect to your Hikvision device. If not specified, the default port 8000 will be used.
      username:
        name: Username
        description: This must be an admin user to login to the device.
      password:
        name: Password
        description: The password for the admin user.
      output_relays:
        name: Output Relays
        description: (optional) Set this option if you don't see the correct number of door switches.
      scenes:
        name: Scenes
        description: (optional) Poll scenes/alarm state every 15 seconds.
      call_state_poll:
        name: Call State Poll Interval
        description: (optional) Poll call state every X seconds for devices that don't support the ringing event.
  system:
    name: System
    description: System configuration options.
    fields:
      log_level:
        name: Log Level
        description: NONE, ERROR, INFO, or DEBUG.
      sdk_log_level:
        name: SDK Log Level
        description: NONE, ERROR, INFO, or DEBUG.
  mqtt:
    name: MQTT
    description: Optional external MQTT broker configuration.
    fields:
      host:
        name: Host
        description: The hostname or IP address of the MQTT broker.
      port:
        name: Port
        description: The port of the MQTT broker.
      ssl:
        name: Use SSL
        description: Whether to use SSL to connect to the MQTT broker.
      username:
        name: Username
        description: The username to connect to the MQTT broker.
      password:
        name: Password
        description: The password to connect to the MQTT broker.